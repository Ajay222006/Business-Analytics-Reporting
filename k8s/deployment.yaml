apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-app
  labels:
    app: analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: ajay222006/business-analytics-reporting:latest
          ports:
            - containerPort: 8080
